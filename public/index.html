<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat App</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f0f2f5;
      }
      .container {
        max-width: 500px;
        margin: 30px auto;
        background: white;
        overflow: hidden;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      }
      h3 {
        margin: 0;
        text-align: center;
        background: rgb(101, 101, 158);
        padding: 15px;
        color: white;
      }
      .join-section {
        display: flex;
        gap: 5px;
        padding: 10px;
      }
      .join-section input {
        flex: 1;
        padding: 8px;
      }
      #joinBtn {
        background-color: green;
        padding: 8px;
        color: white;
        border: none;
        cursor: pointer;
      }
      .input-section {
        display: flex;
        gap: 5px;
        padding: 10px;
      }
      .input-section input {
        flex: 1;
        padding: 10px;
      }
      #sendBtn {
        background-color: #4a76a8;
        padding: 8px;
        color: white;
        border: none;
        cursor: pointer;
      }
      #messages {
        height: 300px;
        overflow-y: auto;
        padding: 10px;
        background: #f2efec;
      }
      .message {
        margin: 5px 0;
        padding: 8px 12px;
        border-radius: 10px;
        max-width: 65%;
        word-wrap: break-word;
        overflow-wrap: break-word;
      }
      .me {
        background: #dcf8c6;
        margin-left: auto;
        text-align: right;
      }
      .other {
        background: white;
      }
      .system {
        text-align: center;
        color: gray;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h3>Chat App</h3>
      <div class="join-section">
        <input type="text" id="room" placeholder="Room" />
        <input type="text" id="username" placeholder="Name" />
        <button id="joinBtn">Join</button>
      </div>
      <div id="messages"></div>
      <div class="input-section">
        <input type="text" id="message" placeholder="Type message..." />
        <button id="sendBtn">Send</button>
      </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>

    <script>
      var socket = io();
      const sendBtn = document.getElementById("sendBtn");
      const joinBtn = document.getElementById("joinBtn");

      const roomInput = document.getElementById("room");
      const userInput = document.getElementById("username");
      const messageInput = document.getElementById("message");
      const allMessage = document.getElementById("messages");

      let username = "";
      let room = "";
      let joined = false;

      //Ask Username
      joinBtn.addEventListener("click", () => {
        username = userInput.value;
        room = roomInput.value;
        if (!username || !room) return;
        // socket.emit("user-joined", username);
        socket.emit("join-room", {
          username,
          room,
        });
        joined = true;
      });

      //Send Message
      sendBtn.addEventListener("click", (e) => {
        const message = messageInput.value;
        const time = new Date().toLocaleTimeString([], {
          hour: "2-digit",
          minute: "2-digit",
        });
        if (!joined) return alert("Join room first");
        if (!message) return;
        socket.emit("user-message", {
          username,
          message,
          room,
          time,
        });

        messageInput.value = "";
      });

      //Receive message
      socket.on("message", (data) => {
        const p = document.createElement("p");
        p.classList.add("message");
        if (data.username === username) {
          p.classList.add("me");
        } else {
          p.classList.add("other");
        }
        p.innerText = `${data.username} (${data.time}): ${data.message}`;
        allMessage.appendChild(p);
      });

      //user joined
      socket.on("user-joined", (msg) => {
        const p = document.createElement("p");
        p.classList.add("system");
        p.innerText = msg;
        allMessage.appendChild(p);
      });

      //user left
      socket.on("user-left", (msg) => {
        const p = document.createElement("p");
        p.classList.add("system");
        p.innerText = msg;
        allMessage.appendChild(p);
      });
    </script>
  </body>
</html>

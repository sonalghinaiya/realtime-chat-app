<svg viewBox="0 0 200 220" xmlns="http://www.w3.org/2000/svg" width="200" height="220">
  <style>
    .bot-group {
      animation: botFloat 3s ease-in-out infinite;
      transform-origin: 100px 110px;
    }
    @keyframes botFloat {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-10px); }
    }
    .antenna-tip {
      animation: antennaPulse 1.2s ease-in-out infinite;
      transform-origin: 100px 18px;
    }
    @keyframes antennaPulse {
      0%, 100% { r: 6; opacity: 1; }
      50%       { r: 10; opacity: 0.5; }
    }
    .eye-l { animation: blink 4s ease-in-out infinite; transform-origin: 78px 95px; }
    .eye-r { animation: blink 4s ease-in-out infinite 0.1s; transform-origin: 122px 95px; }
    @keyframes blink {
      0%, 88%, 100% { transform: scaleY(1); }
      93% { transform: scaleY(0.08); }
    }
    .mouth {
      animation: smile 3s ease-in-out infinite;
      transform-origin: 100px 125px;
    }
    @keyframes smile {
      0%, 100% { transform: scaleX(1); }
      50%       { transform: scaleX(1.12); }
    }
    .arm-l {
      animation: wave 1.6s ease-in-out infinite;
      transform-origin: 40px 128px;
    }
    @keyframes wave {
      0%, 100% { transform: rotate(0deg); }
      30%       { transform: rotate(-22deg); }
      70%       { transform: rotate(12deg); }
    }
    .heart {
      animation: heartPop 2.8s ease-in-out infinite;
      transform-origin: 155px 90px;
    }
    @keyframes heartPop {
      0%, 100% { transform: scale(0); opacity: 0; }
      35%, 65%  { transform: scale(1); opacity: 1; }
      85%        { transform: scale(0); opacity: 0; }
    }
    .wave1 { animation: ripple 2.2s ease-out infinite; transform-origin: 100px 110px; }
    .wave2 { animation: ripple 2.2s ease-out infinite 0.45s; transform-origin: 100px 110px; }
    .wave3 { animation: ripple 2.2s ease-out infinite 0.9s; transform-origin: 100px 110px; }
    @keyframes ripple {
      0%   { transform: scale(0.5); opacity: 0; }
      25%  { opacity: 0.6; }
      100% { transform: scale(1.5); opacity: 0; }
    }
    .cheek-l { animation: blush 3s ease-in-out infinite; }
    .cheek-r { animation: blush 3s ease-in-out infinite 0.2s; }
    @keyframes blush {
      0%, 100% { opacity: 0.4; }
      50%       { opacity: 0.75; }
    }
  </style>

  <!-- ripple rings -->
  <circle class="wave1" cx="100" cy="110" r="76" fill="none" stroke="#a78bfa" stroke-width="2"/>
  <circle class="wave2" cx="100" cy="110" r="90" fill="none" stroke="#818cf8" stroke-width="1.5"/>
  <circle class="wave3" cx="100" cy="110" r="105" fill="none" stroke="#c4b5fd" stroke-width="1"/>

  <g class="bot-group">
    <!-- antenna -->
    <line x1="100" y1="56" x2="100" y2="28" stroke="#c4b5fd" stroke-width="3" stroke-linecap="round"/>
    <circle class="antenna-tip" cx="100" cy="20" r="7" fill="#fbbf24"/>
    <circle cx="100" cy="20" r="3" fill="#fff" opacity="0.7"/>

    <!-- body -->
    <rect x="48" y="56" width="104" height="92" rx="22"
      fill="#4f46e5" fill-opacity="0.85" stroke="#a78bfa" stroke-width="2.5"/>

    <!-- face panel -->
    <rect x="58" y="68" width="84" height="68" rx="14"
      fill="#1e1b4b" fill-opacity="0.55"/>

    <!-- eyes -->
    <g class="eye-l">
      <ellipse cx="78" cy="94" rx="11" ry="12" fill="white"/>
      <circle cx="78" cy="95" r="6" fill="#6366f1"/>
      <circle cx="78" cy="95" r="3" fill="#1e1b4b"/>
      <circle cx="80" cy="92" r="2" fill="white"/>
    </g>
    <g class="eye-r">
      <ellipse cx="122" cy="94" rx="11" ry="12" fill="white"/>
      <circle cx="122" cy="95" r="6" fill="#6366f1"/>
      <circle cx="122" cy="95" r="3" fill="#1e1b4b"/>
      <circle cx="124" cy="92" r="2" fill="white"/>
    </g>

    <!-- cheeks -->
    <ellipse class="cheek-l" cx="66" cy="110" rx="8" ry="5" fill="#f472b6"/>
    <ellipse class="cheek-r" cx="134" cy="110" rx="8" ry="5" fill="#f472b6"/>

    <!-- mouth -->
    <path class="mouth"
      d="M 78 118 Q 100 136 122 118"
      fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round"/>

    <!-- left arm (waving) -->
    <g class="arm-l">
      <rect x="24" y="122" width="26" height="14" rx="7"
        fill="#4f46e5" stroke="#a78bfa" stroke-width="2"/>
    </g>

    <!-- right arm -->
    <rect x="150" y="122" width="26" height="14" rx="7"
      fill="#4f46e5" stroke="#a78bfa" stroke-width="2"/>

    <!-- legs -->
    <rect x="70" y="144" width="22" height="28" rx="10"
      fill="#4f46e5" stroke="#a78bfa" stroke-width="2"/>
    <rect x="108" y="144" width="22" height="28" rx="10"
      fill="#4f46e5" stroke="#a78bfa" stroke-width="2"/>

    <!-- feet -->
    <ellipse cx="81" cy="172" rx="13" ry="6" fill="#6366f1"/>
    <ellipse cx="119" cy="172" rx="13" ry="6" fill="#6366f1"/>

    <!-- heart pop -->
    <g class="heart">
      <path d="M162 84 C162 80 156 74 149 80 C142 74 136 80 136 84 C136 91 149 101 149 101 C149 101 162 91 162 84 Z"
        fill="#f472b6"/>
    </g>

    <!-- tiny bolt on chest -->
    <polygon points="102,80 97,92 101,92 98,104 106,89 102,89"
      fill="#fbbf24" opacity="0.9"/>
  </g>
</svg>
